<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashRead</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header id="header">
            <h1>FlashRead</h1>
            <button id="settingsToggle" title="Settings">&#9881;</button>
        </header>

        <div id="settingsPanel" class="hidden">
            <div class="settings-content">
                <h3>Voice Settings</h3>
                <div class="setting-row">
                    <label for="ttsProvider">TTS Provider:</label>
                    <select id="ttsProvider">
                        <option value="browser">Browser (Basic)</option>
                        <option value="piper">Piper (High Quality, Free)</option>
                        <option value="openai">OpenAI (Premium)</option>
                    </select>
                </div>
                <div id="openaiSettings" class="hidden">
                    <div class="setting-row">
                        <label for="openaiApiKey">API Key:</label>
                        <input type="password" id="openaiApiKey" placeholder="sk-...">
                    </div>
                    <div class="setting-row">
                        <label for="openaiModel">Model:</label>
                        <select id="openaiModel">
                            <option value="tts-1">tts-1 (Fast)</option>
                            <option value="tts-1-hd">tts-1-hd (HD)</option>
                        </select>
                    </div>
                </div>
                <div class="setting-row">
                    <label for="voiceSelect">Voice:</label>
                    <select id="voiceSelect"></select>
                </div>
                <div id="piperVoiceLoading" class="hidden">
                    <span class="loading-text">Loading voice model...</span>
                    <div class="progress-bar"><div id="piperProgress" class="progress-fill"></div></div>
                </div>
            </div>
        </div>

        <main id="main">
            <section id="readerPanel">
                <div id="display">Upload a document to begin</div>

                <div id="controls">
                    <div class="control-row">
                        <button id="fileButton">Choose File</button>
                        <input type="file" id="fileInput" accept=".pdf,.docx,.txt,.epub" hidden>
                        <span id="fileName"></span>
                    </div>

                    <div class="control-row">
                        <label for="speedSlider">Speed:</label>
                        <input type="range" id="speedSlider" min="100" max="1400" value="300" step="10">
                        <span id="speedValue">300 WPM</span>
                    </div>

                    <div class="control-row">
                        <label for="fontSizeSlider">Font Size:</label>
                        <input type="range" id="fontSizeSlider" min="24" max="72" value="48" step="1">
                        <span id="fontSizeValue">48px</span>
                    </div>

                    <div class="control-row toggles">
                        <label class="toggle-label">
                            <input type="checkbox" id="boldFirstHalf">
                            <span>Half-Bold</span>
                        </label>
                        <label class="toggle-label">
                            <input type="checkbox" id="voiceToggle">
                            <span>Voice</span>
                        </label>
                    </div>

                    <div class="control-row buttons">
                        <button id="startButton" disabled>Start</button>
                        <button id="pauseButton" disabled>Pause</button>
                        <button id="prevSentence" disabled title="Previous sentence">&#9664;&#9664;</button>
                        <button id="nextSentence" disabled title="Next sentence">&#9654;&#9654;</button>
                    </div>
                </div>
            </section>

            <section id="viewerPanel">
                <div id="documentViewer">
                    <div id="pdfViewer"></div>
                    <div id="textViewer" class="hidden"></div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
